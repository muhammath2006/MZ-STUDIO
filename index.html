<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MZ Studio</title>
<style>
:root {
  --bg: #0d0d14;
  --bg2: #13131f;
  --bg3: #1a1a2e;
  --bg4: #222235;
  --surface: #1e1e30;
  --surface2: #252540;
  --border: rgba(120,100,255,0.15);
  --border2: rgba(120,100,255,0.3);
  --accent: #7c6af7;
  --accent2: #a08bff;
  --accent3: #5f4ef0;
  --gold: #e8b86d;
  --gold2: #f5d090;
  --teal: #4ec9b0;
  --coral: #f48c72;
  --pink: #d47ab0;
  --text: #e8e6f8;
  --text2: #a09cc0;
  --text3: #6b6890;
  --success: #4ec9a0;
  --danger: #f06070;
  --warn: #e8b86d;
  --radius: 8px;
  --radius2: 12px;
  --radius3: 16px;
  --sidebar-w: 240px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
/* Scrollbars */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.2s;flex-shrink:0;overflow:hidden}
#sidebar.collapsed{width:56px}
.sidebar-logo{padding:16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);font-weight:400}
.sidebar-toggle{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;flex-shrink:0}
.sidebar-toggle:hover{color:var(--text)}
.sidebar-section{padding:8px 0;flex-shrink:0}
.sidebar-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:4px 14px 4px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;border-radius:0;color:var(--text2);transition:all 0.15s;position:relative;white-space:nowrap;overflow:hidden;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:rgba(124,106,247,0.15);color:var(--accent2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-label{font-size:13px;font-weight:500}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
/* Topbar */
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-breadcrumb{font-size:12px;color:var(--text3)}
.topbar-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--surface);border-color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent3);border-color:var(--accent3)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{padding:6px;width:32px;height:32px;justify-content:center}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;flex:1;max-width:360px}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
.search-bar input::placeholder{color:var(--text3)}
/* Content */
#content{flex:1;overflow-y:auto;padding:24px}
/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;text-align:center;transition:border-color 0.15s}
.stat-card:hover{border-color:var(--border2)}
.stat-num{font-size:28px;font-weight:700;color:var(--accent2);line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:0.05em}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:15px;font-weight:600;color:var(--text)}
.section-sub{font-size:12px;color:var(--text3);margin-top:2px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;cursor:pointer;transition:all 0.15s}
.card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.card-meta{font-size:11px;color:var(--text3)}
.card-desc{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.tag-accent{background:rgba(124,106,247,0.2);color:var(--accent2)}
.tag-gold{background:rgba(232,184,109,0.2);color:var(--gold2)}
.tag-teal{background:rgba(78,201,176,0.2);color:var(--teal)}
.tag-coral{background:rgba(244,140,114,0.2);color:var(--coral)}
.tag-pink{background:rgba(212,122,176,0.2);color:var(--pink)}
.tag-success{background:rgba(78,201,160,0.15);color:var(--success)}
.tag-danger{background:rgba(240,96,112,0.15);color:var(--danger)}
/* Progress bar */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.3s}
/* Form elements */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color 0.15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-select option{background:var(--bg3);color:var(--text)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* Panel / Modal */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius3);width:min(600px,95vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.panel-lg{width:min(800px,95vw)}
.panel-header{display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border);gap:10px}
.panel-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.panel-body{padding:20px;overflow-y:auto;flex:1}
.panel-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
/* Editor */
#editor-container{display:flex;height:100%;gap:0}
#editor-sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#editor-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#chapter-list{flex:1;overflow-y:auto;padding:8px}
.chapter-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);transition:all 0.15s;font-size:13px}
.chapter-item:hover{background:var(--surface);color:var(--text)}
.chapter-item.active{background:rgba(124,106,247,0.15);color:var(--accent2)}
.chapter-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-outline{background:var(--text3)}
.status-draft{background:var(--warn)}
.status-revision{background:var(--coral)}
.status-completed{background:var(--success)}
#editor-area{flex:1;overflow-y:auto;padding:40px 60px}
#editor-area.focus-mode{padding:80px 120px;background:var(--bg)}
.editor-title{font-size:28px;font-weight:700;color:var(--text);margin-bottom:8px;background:none;border:none;outline:none;width:100%;font-family:var(--font)}
.editor-title::placeholder{color:var(--text3)}
.editor-content{font-size:15px;line-height:1.8;color:var(--text);background:none;border:none;outline:none;width:100%;resize:none;font-family:var(--font);min-height:400px}
.editor-toolbar{display:flex;align-items:center;gap:4px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.toolbar-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:5px 8px;border-radius:4px;font-size:13px;transition:all 0.15s}
.toolbar-btn:hover{background:var(--surface);color:var(--text)}
.toolbar-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.editor-meta{display:flex;align-items:center;gap:16px;padding:8px 16px;border-top:1px solid var(--border);background:var(--bg2);font-size:12px;color:var(--text3)}
/* Timeline */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border2)}
.timeline-event{position:relative;margin-bottom:20px;padding-left:20px}
.timeline-dot{position:absolute;left:-25px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2)}
.timeline-dot.high{background:var(--danger)}
.timeline-dot.medium{background:var(--warn)}
.timeline-dot.low{background:var(--success)}
.timeline-date{font-size:11px;color:var(--text3);margin-bottom:4px}
.timeline-title{font-size:13px;font-weight:600;color:var(--text)}
.timeline-desc{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}
/* Character card */
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;cursor:pointer;transition:all 0.15s}
.char-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.char-avatar{height:120px;background:linear-gradient(135deg,var(--bg3),var(--surface2));display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.char-avatar-initial{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff}
.char-info{padding:12px}
.char-name{font-size:14px;font-weight:700;color:var(--text)}
.char-role{font-size:11px;color:var(--text3);margin-top:2px}
/* Kanban */
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;height:100%;align-items:flex-start}
.kanban-col{min-width:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);display:flex;flex-direction:column;max-height:100%}
.kanban-col-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kanban-col-title{font-size:13px;font-weight:600;color:var(--text)}
.kanban-col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
.kanban-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:grab;transition:all 0.15s}
.kanban-card:hover{border-color:var(--border2)}
.kanban-card-title{font-size:13px;font-weight:500;color:var(--text)}
.kanban-card-meta{font-size:11px;color:var(--text3);margin-top:4px}
/* Relationship graph placeholder */
.graph-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);height:400px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
/* Notes */
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:14px;cursor:pointer;transition:all 0.15s;position:relative}
.note-card:hover{border-color:var(--border2)}
.note-card.pinned{border-color:var(--gold);border-width:1px}
.note-pin{position:absolute;top:10px;right:10px;color:var(--gold);font-size:14px}
/* World builder tabs */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-item{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.tab-item:hover{color:var(--text)}
.tab-item.active{color:var(--accent2);border-bottom-color:var(--accent)}
/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-desc{font-size:13px;line-height:1.5}
/* Activity feed */
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-icon{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.activity-text{font-size:12px;color:var(--text2);line-height:1.4}
.activity-time{font-size:11px;color:var(--text3);margin-top:2px}
/* Alerts */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:999;font-size:13px;animation:slideUp 0.2s;max-width:320px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-success{border-color:var(--success)}
.toast-error{border-color:var(--danger)}
/* Arc tracker */
.arc-timeline{display:flex;gap:0;overflow-x:auto;padding-bottom:8px}
.arc-step{flex:0 0 120px;padding:12px;background:var(--surface);border:1px solid var(--border);border-right:none;position:relative;cursor:pointer;transition:background 0.15s}
.arc-step:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.arc-step:last-child{border-radius:0 var(--radius) var(--radius) 0;border-right:1px solid var(--border)}
.arc-step:hover{background:var(--surface2)}
.arc-step.active{background:rgba(124,106,247,0.15);border-color:var(--accent)}
.arc-book{font-size:10px;color:var(--text3);margin-bottom:4px}
.arc-label{font-size:12px;font-weight:600;color:var(--text)}
/* Divider */
.divider{height:1px;background:var(--border);margin:20px 0}
/* Scrollable content wrapper */
.scroll-content{flex:1;overflow-y:auto;padding:24px}
/* Floating action */
.fab{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,106,247,0.4);transition:all 0.2s;z-index:50}
.fab:hover{background:var(--accent3);transform:scale(1.05)}
/* Status badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-draft{background:rgba(232,184,109,0.2);color:var(--gold2)}
.badge-completed{background:rgba(78,201,160,0.2);color:var(--success)}
.badge-outline{background:rgba(160,156,192,0.15);color:var(--text2)}
.badge-revision{background:rgba(244,140,114,0.2);color:var(--coral)}
/* Settings */
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;margin-bottom:16px}
.settings-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:13px;color:var(--text)}
.settings-desc{font-size:11px;color:var(--text3);margin-top:2px}
/* Toggle */
.toggle{position:relative;display:inline-block;width:36px;height:20px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg3);border-radius:10px;transition:0.2s;cursor:pointer;border:1px solid var(--border2)}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle-slider::before{content:'';position:absolute;height:14px;width:14px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
/* Mobile overlay sidebar backdrop */
#sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;backdrop-filter:blur(2px)}
/* Hamburger button for mobile topbar */
#mobile-menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:6px;border-radius:var(--radius);font-size:18px;flex-shrink:0}
/* Tablet */
@media(max-width:900px){
  :root{--sidebar-w:200px}
  .form-row3{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  #editor-area{padding:24px 32px}
}
/* Mobile */
@media(max-width:640px){
  :root{--sidebar-w:260px}
  #mobile-menu-btn{display:flex}
  #sidebar-backdrop.visible{display:block}
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);width:var(--sidebar-w)!important}
  #sidebar.mobile-open{transform:translateX(0)}
  #sidebar .sidebar-toggle{display:none}
  .logo-text{display:block!important}
  .nav-label{display:block!important}
  .sidebar-label{display:block!important}
  #content{padding:16px!important}
  #editor-area{padding:20px 16px!important}
  .form-row,.form-row3{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  #topbar{padding:0 12px;gap:8px}
  #last-saved{display:none}
  .topbar-actions .btn-sm:not(#topbar-action-btn){display:none}
  .panel{width:95vw!important;max-height:92vh}
  #editor-container{flex-direction:column}
  #editor-sidebar{width:100%!important;max-height:160px;border-right:none;border-bottom:1px solid var(--border)}
  #chapter-list{display:flex;flex-direction:row;overflow-x:auto;padding:4px}
  .chapter-item{flex-shrink:0;min-width:120px}
  .kanban-board{gap:10px}
  .kanban-col{min-width:180px}
  .topbar-breadcrumb{display:none}
  #editor-area.focus-mode{padding:40px 16px!important}
  .tab-bar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tab-item{flex-shrink:0}
  .arc-timeline{gap:0}
}
@media(min-width:641px){
  #mobile-menu-btn{display:none!important}
}
</style>
</head>
<body>
<div id="app">
<div id="sidebar-backdrop" onclick="closeMobileSidebar()"></div>
<nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <div class="logo-text">MZ Studio<br><span class="logo-sub">Story Universe</span></div>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="sidebar-label">Workspace</div>
        <button class="nav-item active" onclick="nav('dashboard')">

// ============================================================
// DATABASE - IndexedDB
// ============================================================
const DB_NAME = 'MZStudio';
const DB_VERSION = 2;
let db;

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      ['projects','books','chapters','characters','timeline','locations','organizations','artifacts','notes','relationships','backups','settings','research'].forEach(store => {
        if (!d.objectStoreNames.contains(store)) {
          d.createObjectStore(store, {keyPath:'id'});
        }
      });
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(store, id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = id ? tx.objectStore(store).get(id) : tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(store, obj) {
  return new Promise((res, rej) => {
    if (!obj.id) obj.id = crypto.randomUUID();
    obj.updatedAt = Date.now();
    if (!obj.createdAt) obj.createdAt = Date.now();
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => res(obj);
    req.onerror = () => rej(req.error);
  });
}

function dbDelete(store, id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

  let h = 0; for (const c of id) h = c.charCodeAt(0) + h * 31;
  return colors[Math.abs(h) % colors.length];
}

async function renderChapters() {
  const allChapters = await dbGet('chapters');
  const chapters = state.currentBook ? allChapters.filter(c=>c.bookId===state.currentBook.id) : allChapters;

  if (chapters.length > 0 && !state.currentChapter) {
    state.currentChapter = chapters[0];
  }

  const content = document.getElementById('content');
  content.style.padding = '0';
  content.innerHTML = `
    <div id="editor-container" style="height:100%;display:flex">
      <div id="editor-sidebar">
        <div style="padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:12px;font-weight:600;color:var(--text2)">${state.currentBook ? sanitize(state.currentBook.title) : 'All Chapters'}</div>
          <button class="btn btn-sm btn-primary" onclick="showNewChapterModal()">+</button>
        </div>
        <div id="chapter-list">
          ${chapters.length === 0 ? '<p style="color:var(--text3);font-size:12px;padding:16px;text-align:center">No chapters yet</p>' :
            chapters.map(c=>`
              <div class="chapter-item${state.currentChapter?.id===c.id?' active':''}" onclick="selectChapter('${c.id}')">

                <div style="flex:1;min-width:0">
                  <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sanitize(c.title||'Untitled')}</div>
                  <div style="font-size:10px;color:var(--text3)">${wordCount(c.content||'')} words</div>
                </div>
              </div>
            `).join('')}
        </div>
      </div>
      <div id="editor-main">
        ${state.currentChapter ? renderEditorPanel(state.currentChapter) : `
          <div class="empty-state" style="margin-top:60px">
            <div class="empty-icon">✍️</div>
            <div class="empty-title">No chapter selected</div>
            <div class="empty-desc">Create a chapter to start writing.</div>
            <button class="btn btn-primary" style="margin-top:16px" onclick="showNewChapterModal()">+ New Chapter</button>

  // Reset padding
  content.style.padding = '0';
}

function renderEditorPanel(chapter) {
  return `
    <div class="editor-toolbar">
      <button class="toolbar-btn" onclick="formatText('bold')" title="Bold"><b>B</b></button>
      <button class="toolbar-btn" onclick="formatText('italic')" title="Italic"><i>I</i></button>
      <button class="toolbar-btn" onclick="formatText('underline')" title="Underline"><u>U</u></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="insertText('\\n\\n')" title="Paragraph">¶</button>
      <div class="toolbar-sep"></div>
      <select class="form-select" id="chapter-status-sel" style="font-size:11px;padding:3px 8px;width:auto" onchange="updateChapterStatus()">
        ${['outline','draft','revision','completed'].map(s=>`<option value="${s}"${chapter.status===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
      </select>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="toggleFocusMode()" title="Focus Mode">⛶</button>
      <button class="toolbar-btn" onclick="editChapterDetails('${chapter.id}')" title="Chapter Settings">⚙</button>
      <button class="toolbar-btn" onclick="deleteItem('chapters','${chapter.id}','Chapter',()=>{ state.currentChapter=null; renderChapters(); })" title="Delete Chapter" style="color:var(--danger)">🗑</button>
    </div>
    <div id="editor-area">
      <input class="editor-title" id="chapter-title-input" value="${sanitize(chapter.title||'')}" 
        placeholder="Chapter Title..." onchange="saveChapterTitle()" />
      <textarea class="editor-content" id="chapter-content-area"
        placeholder="Begin your story here..."
        onkeydown="scheduleAutosave()"
        oninput="updateWordCount()">${chapter.content||''}</textarea>
    </div>
    <div class="editor-meta">
      <span id="word-count-display">${wordCount(chapter.content||'')} words</span>
      <span>${charCount(chapter.content||'')} chars</span>
      <span id="reading-time">${readingTime(chapter.content||'')} min read</span>
      <span id="autosave-status" style="margin-left:auto;color:var(--success)">✓ Saved</span>
    </div>
  `;
}

async function selectChapter(id) {
  if (state.currentChapter) await saveCurrentChapter();
  const allChapters = await dbGet('chapters');
  state.currentChapter = allChapters.find(c=>c.id===id);
  const editorMain = document.getElementById('editor-main');
  if (editorMain) {
    editorMain.innerHTML = renderEditorPanel(state.currentChapter);
  }
  document.querySelectorAll('.chapter-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.chapter-item').forEach(el=>{
    if(el.getAttribute('onclick')===`selectChapter('${id}')`) el.classList.add('active');
  });
}

async function saveCurrentChapter() {
  if (!state.currentChapter) return;
  const titleEl = document.getElementById('chapter-title-input');
  const contentEl = document.getElementById('chapter-content-area');
  if (!titleEl || !contentEl) return;
  state.currentChapter.title = titleEl.value;
  state.currentChapter.content = contentEl.value;
  await dbPut('chapters', state.currentChapter);
  updateLastSaved();
}

async function saveChapterTitle() {
  const titleEl = document.getElementById('chapter-title-input');
  if (titleEl && state.currentChapter) {
    state.currentChapter.title = titleEl.value;
    await dbPut('chapters', state.currentChapter);
  }
}

function scheduleAutosave() {
  const el = document.getElementById('autosave-status');
  if (el) el.textContent = '● Unsaved';
  clearTimeout(state.autosaveTimer);
  state.autosaveTimer = setTimeout(async () => {
    await saveCurrentChapter();
    if (el) el.textContent = '✓ Saved';
  }, 2000);
}

function updateWordCount() {
  const content = document.getElementById('chapter-content-area')?.value || '';
  const wc = document.getElementById('word-count-display');
  const rt = document.getElementById('reading-time');
  if(wc) wc.textContent = `${wordCount(content)} words`;
  if(rt) rt.textContent = `${readingTime(content)} min read`;
}

async function updateChapterStatus() {
  const sel = document.getElementById('chapter-status-sel');
  if (sel && state.currentChapter) {
    state.currentChapter.status = sel.value;
    await dbPut('chapters', state.currentChapter);
  }
}

function toggleFocusMode() {
  document.getElementById('editor-area')?.classList.toggle('focus-mode');
}

function formatText(cmd) {
  document.execCommand(cmd, false, null);
}

function insertText(text) {
  const ta = document.getElementById('chapter-content-area');
  if (!ta) return;
  const start = ta.selectionStart;
  ta.value = ta.value.slice(0, start) + text + ta.value.slice(ta.selectionEnd);
  ta.selectionStart = ta.selectionEnd = start + text.length;
}

      </div>

        <canvas id="rel-canvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
        ${characters.length < 2 ? `<div style="text-align:center;color:var(--text3)"><div style="font-size:32px;margin-bottom:8px">◉</div><div>Add at least 2 characters to see connections</div></div>` : ''}
      </div>
      <div style="margin-top:20px">
        <div class="section-title" style="margin-bottom:12px">All Connections (${relationships.length})</div>
        ${relationships.length === 0 ? `<p style="color:var(--text3);font-size:13px">No connections defined yet.</p>` :
          `<div style="display:flex;flex-direction:column;gap:8px">
            ${relationships.map(r=>`
              <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;color:var(--text)">${sanitize(r.from)}</span>
                <span class="tag tag-accent">${sanitize(r.type)}</span>
                <span style="font-weight:600;color:var(--text)">${sanitize(r.to)}</span>
                ${r.description ? `<span style="color:var(--text3);font-size:12px;margin-left:auto">${sanitize(r.description)}</span>` : ''}
                <button class="btn btn-sm" onclick="deleteItem('relationships','${r.id}','Connection',renderRelationships)" style="color:var(--danger)">✕</button>
              </div>
            `).join('')}
          </div>`}
      </div>
    </div>
  `;

  if (characters.length >= 2) drawRelGraph(characters, relationships);
}

function drawRelGraph(chars, rels) {
  const canvas = document.getElementById('rel-canvas');
  if (!canvas) return;
  const container = document.getElementById('rel-graph');
  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const nodes = chars.slice(0,20).map((c, i) => {
    const angle = (i / Math.min(chars.length, 20)) * Math.PI * 2;
    return { id: c.id, name: c.name, x: W/2 + Math.cos(angle)*(Math.min(W,H)*0.35), y: H/2 + Math.sin(angle)*(Math.min(W,H)*0.35) };
  });

  ctx.clearRect(0,0,W,H);

  rels.forEach(r => {
    const fromNode = nodes.find(n=>n.name===r.from || n.id===r.fromId);
    const toNode = nodes.find(n=>n.name===r.to || n.id===r.toId);
    if (!fromNode || !toNode) return;
    ctx.beginPath();
    ctx.moveTo(fromNode.x, fromNode.y);
    ctx.lineTo(toNode.x, toNode.y);
    ctx.strokeStyle = 'rgba(124,106,247,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    const mx = (fromNode.x+toNode.x)/2, my = (fromNode.y+toNode.y)/2;
    ctx.fillStyle = 'rgba(160,139,255,0.8)';
    ctx.font = '10px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(r.type||'', mx, my);
  });

  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, 22, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(30,30,48,0.95)';
    ctx.fill();
    ctx.strokeStyle = '#7c6af7';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#e8e6f8';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.name.charAt(0).toUpperCase(), n.x, n.y);
    ctx.font = '10px sans-serif';
    ctx.fillStyle = 'rgba(160,156,192,0.8)';
    ctx.textBaseline = 'top';
    ctx.fillText(n.name.length > 10 ? n.name.slice(0,9)+'…' : n.name, n.x, n.y+26);
  });
}

  const content = document.getElementById('content');
  content.innerHTML = `

async function doSearch(query) {
  if (!query.trim()) {
    document.getElementById('search-results').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Start typing to search</div></div>';
    return;
  }
  const q = query.toLowerCase();
  const [chars, books, chapters, events, notes, locs] = await Promise.all([
    dbGet('characters'), dbGet('books'), dbGet('chapters'), dbGet('timeline'), dbGet('notes'), dbGet('locations')
  ]);
  const results = [
    ...chars.filter(c=>matches(c,q,'name','nickname','backstory')).map(c=>({type:'Character',icon:'👤',title:c.name,sub:c.nickname||'',id:c.id})),
    ...books.filter(b=>matches(b,q,'title','description')).map(b=>({type:'Book',icon:'📚',title:b.title,sub:b.subtitle||'',id:b.id})),
    ...chapters.filter(c=>matches(c,q,'title','content')).map(c=>({type:'Chapter',icon:'📝',title:c.title,sub:`${wordCount(c.content||'')} words`,id:c.id})),
    ...events.filter(e=>matches(e,q,'name','description')).map(e=>({type:'Event',icon:'⏱',title:e.name,sub:e.year?`Year ${e.year}`:'',id:e.id})),
    ...notes.filter(n=>matches(n,q,'title','content')).map(n=>({type:'Note',icon:'🗒',title:n.title,sub:'',id:n.id})),
    ...locs.filter(l=>matches(l,q,'name','description')).map(l=>({type:'Location',icon:'🌍',title:l.name,sub:l.region||'',id:l.id})),
  ];

  const el = document.getElementById('search-results');
  el.innerHTML = results.length === 0 ? `<p style="color:var(--text3);font-size:13px">No results for "${sanitize(query)}"</p>` : `
    <div style="margin-bottom:12px;font-size:12px;color:var(--text3)">${results.length} result${results.length!==1?'s':''}</div>
    ${results.map(r=>`
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="searchNav('${r.type}','${r.id}')">
        <span style="font-size:20px">${r.icon}</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${sanitize(r.title)}</div>
          <div style="font-size:11px;color:var(--text3)">${r.type}${r.sub?` · ${sanitize(r.sub)}`:''}</div>
        </div>
        <span style="margin-left:auto;font-size:11px;color:var(--text3)">→</span>
      </div>
    `).join('')}
  `;
}

function matches(obj, q, ...fields) {
  return fields.some(f => (obj[f]||'').toLowerCase().includes(q));
}

function searchNav(type, id) {
  const routes = {Character:'characters',Book:'books',Chapter:'chapters',Event:'timeline',Note:'notes',Location:'world'};
  nav(routes[type]||'dashboard');
}

async function globalSearch(q) { if (state.currentPage==='search') doSearch(q); }

async function exportData(format) {
  const stores = ['projects','books','chapters','characters','timeline','locations','organizations','artifacts','notes','relationships'];
  const data = {};
  for (const s of stores) data[s] = await dbGet(s);
  data.exportedAt = new Date().toISOString();
  data.version = '1.0';

  let content, filename, mime;
  if (format === 'json') {
    content = JSON.stringify(data, null, 2);
    filename = `dream-story-export-${Date.now()}.json`;
    mime = 'application/json';
  } else if (format === 'markdown') {
    content = buildMarkdownExport(data);
    filename = `dream-story-export-${Date.now()}.md`;
    mime = 'text/markdown';
  } else {
    content = buildTextExport(data);
    filename = `dream-story-export-${Date.now()}.txt`;
    mime = 'text/plain';
  }

  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Export ready!','success');
}

function buildMarkdownExport(data) {
  let md = `# MZ Studio Universe Export\n\nExported: ${data.exportedAt}\n\n`;
  if (data.characters?.length) {
    md += `## Characters (${data.characters.length})\n\n`;
    data.characters.forEach(c => {
      md += `### ${c.name||'Unnamed'}\n`;
      if (c.nickname) md += `**Nickname:** ${c.nickname}\n`;
      if (c.backstory) md += `\n**Backstory:** ${c.backstory}\n`;
      md += '\n';
    });
  }
  if (data.books?.length) {
    md += `## Books (${data.books.length})\n\n`;
    data.books.forEach(b => { md += `### ${b.title||'Untitled'}\n${b.description||''}\n\n`; });
  }
  if (data.chapters?.length) {
    md += `## Chapters (${data.chapters.length})\n\n`;
    data.chapters.forEach(c => { md += `### ${c.title||'Untitled'}\n\n${c.content||''}\n\n---\n\n`; });
  }
  return md;
}

function buildTextExport(data) {
  let txt = `DREAM STORY UNIVERSE EXPORT\nExported: ${data.exportedAt}\n${'='.repeat(50)}\n\n`;
  if (data.chapters?.length) {
    data.chapters.forEach(c => { txt += `CHAPTER: ${c.title||'Untitled'}\n${'-'.repeat(30)}\n${c.content||''}\n\n`; });
  }
  return txt;
}

async function importData(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.version) { toast('Invalid export file','error'); return; }

    const stores = ['projects','books','chapters','characters','timeline','locations','organizations','artifacts','notes','relationships'];
    for (const s of stores) {
      if (data[s]) {
        for (const item of data[s]) await dbPut(s, item);
      }
    }
    toast(`Import complete! Restored data.`, 'success');
    renderDashboard();
    nav('dashboard');
  } catch(e) {
    toast('Import failed: invalid file', 'error');
  }
}

async function manualBackup() {
  const stores = ['projects','books','chapters','characters','timeline','locations','organizations','artifacts','notes','relationships'];
  const data = {};
  for (const s of stores) data[s] = await dbGet(s);

  await dbPut('backups', {
    timestamp: Date.now(),
    label: `Backup ${new Date().toLocaleString()}`,
    data: JSON.stringify(data)
  });
  updateLastSaved();
  toast('Backup created!','success');
  if (document.getElementById('backup-list')) loadBackupList();
}

async function loadBackupList() {
  const el = document.getElementById('backup-list');
  if (!el) return;
  const backups = (await dbGet('backups')).sort((a,b)=>b.timestamp-a.timestamp).slice(0,5);
  el.innerHTML = backups.length === 0 ? '<p style="font-size:12px;color:var(--text3)">No backups yet</p>' :
    backups.map(b=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;color:var(--text2);flex:1">${sanitize(b.label)}</span>
        <button class="btn btn-sm" onclick="restoreBackup('${b.id}')">Restore</button>
      </div>
    `).join('');
}

async function restoreBackup(id) {
  if (!confirm('Restore this backup? Current data will be overwritten.')) return;
  const backup = await dbGet('backups', id);
  const data = JSON.parse(backup.data);
  const stores = Object.keys(data);
  for (const s of stores) {
    if (Array.isArray(data[s])) for (const item of data[s]) await dbPut(s, item);
  }
  toast('Backup restored!','success');
  nav('dashboard');
}

// ============================================================
// TOAST
// ============================================================
function toast(message, type='') {
  const container = document.getElementById('toast-container');
  const id = 'toast-' + Date.now();
  const icons = {success:'✓',error:'✕','':`ℹ`};
  const el = document.createElement('div');
  el.className = `toast${type?` toast-${type}`:''}`;
  el.id = id;
  el.innerHTML = `<span style="color:var(--${type==='success'?'success':type==='error'?'danger':'text2'})">${icons[type]||'ℹ'}</span><span>${sanitize(message)}</span>`;
  container.appendChild(el);
  setTimeout(()=>{ const e=document.getElementById(id); if(e) e.remove(); }, 3000);
}

// ============================================================
// UTILITIES
// ============================================================
function sanitize(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function v(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function wordCount(text) {
  if (!text || !text.trim()) return 0;
  return text.trim().split(/\s+/).length;
}

function charCount(text) { return (text||'').length; }

function readingTime(text) {
  return Math.max(1, Math.round(wordCount(text) / 250));
}

function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

function timeAgo(ts) {
  if (!ts) return 'Never';
  const diff = Date.now() - ts;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return `${Math.round(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.round(diff/3600000)}h ago`;
  return `${Math.round(diff/86400000)}d ago`;
}

function updateLastSaved() {
  state.lastSaved = Date.now();
  const el = document.getElementById('last-saved');
  if (el) el.textContent = `Saved ${timeAgo(state.lastSaved)}`;
}

async function updateResearchEntry(id) {
  const e = await dbGet('research', id);
  e.title=v('f-title'); e.category=v('f-cat'); e.source=v('f-source');
  e.summary=v('f-summary'); e.content=v('f-content');
  e.relatedChars=v('f-chars'); e.tags=v('f-tags');
  e.starred = document.getElementById('f-starred')?.checked || false;
  await dbPut('research', e);
  closeModal(); toast('Saved!', 'success'); renderResearch();
}

// ============================================================
// GLOBAL AUTOSAVE (every 30s)
// ============================================================
setInterval(async () => {
  if (state.currentPage === 'chapters' && state.currentChapter) {
    await saveCurrentChapter();
    updateLastSaved();
  }
}, 30000);

// Update "last saved" display periodically
setInterval(()=>{
  if (state.lastSaved) {
    const el = document.getElementById('last-saved');
    if (el) el.textContent = `Saved ${timeAgo(state.lastSaved)}`;
  }
}, 60000);

// ============================================================
// INIT
// ============================================================
async function init() {
  await initDB();
  // Seed settings if first run
  let settings = await dbGet('settings', 'app-settings');
  if (!settings) {
    await dbPut('settings', { id: 'app-settings', theme: 'dark', autosave: true });
  }

  nav('dashboard');
  toast('Welcome to MZ Studio ✦', 'success');
}

init().catch(console.error);
</script>
